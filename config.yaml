model_list:
  - model_name: MiniMax-M3
    litellm_params:
      model: openai/MiniMax-M3
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_KEY

  - model_name: embeddinggemma
    litellm_params:
      model: openai/embeddinggemma
      api_base: http://ollama:11434/v1
      api_key: sk-no-auth-needed

router_settings:
  num_retries: 2
  timeout: 300
  enable_signing: false

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  request_timeout: 300
  callbacks: ["callbacks.proxy_handler"]

general_settings: {}